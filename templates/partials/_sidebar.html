{% load static %}
<div class="flex flex-col h-full scmd-sidebar-shell transition-all duration-300 relative z-50 select-none" id="sidebar-content">
    <div class="scmd-sidebar-brand h-20 flex items-center px-6 shrink-0 z-20 relative overflow-hidden">
        <a href="{% url 'dashboard:main' %}" class="flex items-center gap-4 w-full outline-none relative z-10 no-underline scmd-focus-ring rounded-xl">
            <img
                src="{% static 'img/logo_moi.png' %}"
                alt="Logo SCMD Pro"
                class="scmd-sidebar-logo w-10 h-10 object-contain shrink-0 rounded-xl"
            >

            <div class="sidebar-text opacity-100 transition-all duration-300 whitespace-nowrap">
                <h1 class="scmd-sidebar-title font-black text-xl tracking-tight leading-none">
                    SCMD <span class="scmd-sidebar-accent">Pro</span>
                </h1>
                <p class="scmd-sidebar-tagline text-[9px] font-extrabold tracking-[0.25em] mt-1.5 uppercase">
                    Chỉ huy và quản trị vận hành
                </p>
            </div>
        </a>
    </div>

    <nav class="scmd-sidebar-nav flex-1 overflow-y-auto overflow-x-hidden py-8 space-y-2 px-4 relative z-10" id="sidebar-nav">
        {% include "partials/sidebar_menu_items.html" %}

        {% if user.is_staff %}
        <div class="mt-10 pt-8 border-t border-white/10 sidebar-text pb-6 px-1">
            <p class="scmd-sidebar-section px-3 text-[10px] font-black uppercase tracking-[0.2em] mb-4 opacity-80">
                Hệ thống lõi
            </p>
            <a href="/admin/" class="scmd-sidebar-admin-link scmd-focus-ring flex items-center gap-3 px-4 py-3.5 rounded-xl text-xs font-black transition-all duration-300 group">
                <div class="w-6 h-6 flex items-center justify-center rounded-lg bg-white/10 transition-colors">
                    <i class="fas fa-shield-alt transition-transform group-hover:scale-110"></i>
                </div>
                <span class="tracking-widest uppercase">Trang quản trị</span>
                <i class="fas fa-external-link-alt ml-auto text-[10px] opacity-0 group-hover:opacity-100 transition-opacity"></i>
            </a>
        </div>
        {% endif %}
    </nav>

    {% if user.is_authenticated %}
    <div class="scmd-sidebar-user p-5 z-30">
        <a
            href="{% if '/mobile/' in request.path %}{% url 'users:mobile_profile' %}{% else %}{% url 'users:profile' %}{% endif %}"
            class="scmd-user-card scmd-focus-ring flex items-center gap-3 w-full p-2.5 rounded-xl transition-all duration-300 text-left group outline-none"
        >
            <div class="scmd-user-card-avatar w-11 h-11 rounded-xl flex items-center justify-center text-white font-black shrink-0 overflow-hidden">
                <span class="text-lg transition-transform group-hover:scale-110">{{ user.username|slice:":1"|upper }}</span>
            </div>

            <div class="sidebar-text flex-1 overflow-hidden">
                <p class="text-sm font-black text-slate-100 truncate tracking-wide">
                    {{ user.username }}
                </p>
                <div class="flex items-center gap-2 mt-1">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <p class="text-[9px] text-emerald-400 font-bold uppercase tracking-[0.15em]">Sẵn sàng</p>
                </div>
            </div>

            <i class="fas fa-chevron-right text-[10px] text-slate-500 sidebar-text transition-all group-hover:translate-x-1 group-hover:text-white"></i>
        </a>
    </div>
    {% endif %}
</div>

<script>
    function toggleMenu(menuId, el = null) {
        const menu = document.getElementById(menuId);
        if (!menu) {
            console.warn(`[SCMD Sidebar] Menu ID "${menuId}" không tồn tại.`);
            return;
        }

        const arrow = document.getElementById('arrow-' + menuId);
        const isHidden = menu.classList.contains('hidden');

        if (isHidden) {
            menu.classList.remove('hidden');
            menu.style.opacity = '0';
            requestAnimationFrame(() => {
                menu.style.transition = 'opacity 0.3s ease-in-out';
                menu.style.opacity = '1';
            });

            if (arrow) arrow.classList.add('rotate-90');

            setTimeout(() => {
                let target = el;
                if (!target && menu.previousElementSibling) {
                    target = menu.previousElementSibling;
                }
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
                }
            }, 200);
        } else {
            menu.classList.add('hidden');
            if (arrow) arrow.classList.remove('rotate-90');
        }
    }
</script>
