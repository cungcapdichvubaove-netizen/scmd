{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>{% block title %}SCMD Pro{% endblock %}</title>

    <link rel="icon" type="image/png" href="{% static 'img/logo_moi.png' %}">
    <meta name="theme-color" content="#0f172a">

    {% tailwind_css %}
    <link rel="stylesheet" href="{% static 'common/css/brand_system.css' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .loader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-enter {
            animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="scmd-public-shell p-4 md:p-6">
    <div id="global-loader" class="loader-overlay">
        <div class="flex flex-col items-center">
            <i class="fas fa-shield-halved fa-beat text-blue-400 text-4xl mb-4"></i>
            <p class="text-white text-sm font-bold tracking-[0.2em]">HỆ THỐNG ĐANG XỬ LÝ</p>
        </div>
    </div>

    <div class="w-full max-w-md animate-enter">
        <header class="text-center mb-8">
            <div class="inline-block relative">
                <img src="{% static 'img/logo_moi.png' %}" alt="Logo" class="w-20 h-20 mx-auto mb-4 drop-shadow-2xl">
                <div class="absolute inset-0 bg-blue-400/15 blur-2xl -z-10 rounded-full"></div>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight">SCMD Pro</h1>
            <p class="scmd-public-kicker text-xs mt-1 uppercase tracking-[0.3em]">Phần mềm chỉ huy và quản trị vận hành</p>
        </header>

        <main class="scmd-public-card rounded-[2.5rem] p-8 md:p-10">
            {% block content %}{% endblock %}
        </main>

        <footer class="text-center mt-12">
            <p class="scmd-public-footer text-[10px] font-bold uppercase tracking-widest">
                &copy; 2026 SCMD Pro
            </p>
        </footer>
    </div>

    <script>
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function() {
                document.getElementById('global-loader').style.display = 'flex';
            });
        });

        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            if (currentPath.includes('logout')) {
                window.sessionStorage.clear();
                window.localStorage.clear();
                setTimeout(() => {
                    window.location.href = "{% url 'main:login' %}";
                }, 1000);
            }
        });
    </script>
</body>
</html>
