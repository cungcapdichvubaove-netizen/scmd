{# file: users/templates/users/mobile/password_change.html #}
{% extends "mobile/base.html" %}
{% load django_bootstrap5 %}

{% block title %}Đổi mật khẩu{% endblock %}

{% block content %}
<div class="fade-in pt-4">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold text-slate-800 mb-1">Đổi mật khẩu</h2>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% bootstrap_form form show_label=True %}
            
            <div class="flex gap-3 mt-6">
                <a href="{% url 'users:mobile_profile' %}" class="btn flex-1 bg-slate-100 text-slate-600 border-none hover:bg-slate-200">Hủy</a>
                <button type="submit" class="btn flex-1 bg-blue-600 text-white border-none hover:bg-blue-700">Xác nhận</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
