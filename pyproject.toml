[tool.black]
# Cấu hình chuẩn cho Black để đồng bộ với flake8
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.venv
    | venv
    | _build
    | build
    | dist
    | migrations
)/
'''

[tool.isort]
# Đảm bảo isort hoạt động đồng nhất với Black
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip = ["migrations", "venv", ".venv"]

[tool.mypy]
# Kiểm tra kiểu tĩnh để gia cố tính Stability
python_version = "3.11"
check_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
exclude = [
    "migrations",
    "venv",
    ".venv"
]
