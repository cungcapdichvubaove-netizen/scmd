# docker-compose.prod.yml
version: '3.8'

services:
  # --- 1. WEB APP (DAPHNE) ---
  web:
    build: .
    container_name: scmd_web_prod
    command: /app/scripts/entrypoint.sh
    expose:
      - "8000" # Chỉ mở nội bộ cho Nginx thấy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env # Load biến môi trường từ file .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
      - redis
    restart: always

  # --- 2. NGINX (GATEWAY) ---
  nginx:
    image: nginx:1.25-alpine
    container_name: scmd_nginx
    ports:
      - "80:80" # Mở cổng web 80 ra ngoài internet
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles # Share volume để lấy file tĩnh
      - media_volume:/app/media
    depends_on:
      - web
    restart: always

  # --- 3. WORKER (CELERY) ---
  celery:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  # --- 4. BEAT (SCHEDULED TASKS) ---
  celery_beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  # --- 5. DATABASE (POSTGIS) ---
  db:
    image: postgis/postgis:15-3.3
    container_name: scmd_db_prod
    environment:
      - POSTGRES_DB=${SQL_DATABASE}
      - POSTGRES_USER=${SQL_USER}
      - POSTGRES_PASSWORD=${SQL_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always

  # --- 6. REDIS ---
  redis:
    image: redis:7-alpine
    container_name: scmd_redis_prod
    restart: always

volumes:
  postgres_data_prod:
  static_volume:
  media_volume: