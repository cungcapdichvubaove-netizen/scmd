# docker-compose.prod.yml
services:
  migrate:
    build: .
    container_name: scmd_migrate_prod
    command: ["/app/scripts/entrypoint.sh", "python", "manage.py", "migrate", "--noinput"]
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - SCMD_ORGANIZATION_ID=${SCMD_ORGANIZATION_ID}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  # --- 1. WEB APP (DAPHNE) ---
  web:
    build: .
    container_name: scmd_web_prod
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
    expose:
      - "8000" # Chỉ mở nội bộ cho Nginx thấy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env # Load biến môi trường từ file .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - SCMD_ORGANIZATION_ID=${SCMD_ORGANIZATION_ID} # Load from .env for production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- 2. NGINX (GATEWAY) ---
  nginx:
    image: nginx:1.25-alpine
    container_name: scmd_nginx
    ports:
      - "80:80" # Mở cổng web 80 ra ngoài internet
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles # Share volume để lấy file tĩnh
      - media_volume:/app/media
    depends_on:
      - web
    restart: always

  # --- 3. WORKER (CELERY) ---
  celery:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # --- 4. BEAT (SCHEDULED TASKS) ---
  celery_beat:
    build: .
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # --- 5. DATABASE (POSTGIS) ---
  db:
    image: postgis/postgis:15-3.3
    container_name: scmd_db_prod
    environment:
      - POSTGRES_DB=${SQL_DATABASE}
      - POSTGRES_USER=${SQL_USER}
      - POSTGRES_PASSWORD=${SQL_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 6. REDIS ---
  redis:
    image: redis:7-alpine
    container_name: scmd_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data_prod:
  static_volume:
  media_volume:
