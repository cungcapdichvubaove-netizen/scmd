server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_static on;

    # 1. Serve static assets directly.
    location /static/ {
        alias /app/staticfiles/;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        gzip_static on;
    }

    # 2. Internal authorization gate for private media.
    location = /_internal/media-auth/ {
        internal;
        proxy_pass http://scmd_backend;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $arg_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 3. Serve media only after Django authorizes the object.
    location /media/ {
        auth_request /_internal/media-auth/?uri=$request_uri;
        alias /app/media/;
        try_files $uri =404;
        add_header Cache-Control "private, no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 4. Proxy all application traffic to Django/Daphne.
    location / {
        proxy_pass http://scmd_backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scmd_forwarded_proto;
        proxy_redirect off;
        add_header Cache-Control "no-store" always;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket support.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    client_max_body_size 20M;
}
