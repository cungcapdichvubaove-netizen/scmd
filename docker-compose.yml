services:
  # --- 1. DJANGO WEB APP ---
  web:
    build: .
    # Ép web thực hiện migrate và collectstatic trước khi chạy server
    command: >
      sh -c "python manage.py migrate && 
             python manage.py collectstatic --noinput && 
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Chỉ chạy khi DB thực sự sẵn sàng
      redis:
        condition: service_started
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-dev-key
      - DATABASE_URL=postgres://scmd_user:scmd_password@db:5432/scmd_db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
    user: root 

  # --- 2. WORKER (CELERY) ---
  celery:
    build: .
    # Celery CHỈ chạy worker, KHÔNG chạy migrate để tránh xung đột
    command: celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      web:
        condition: service_started # Đợi web migrate xong mới chạy worker
      db:
        condition: service_healthy
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://scmd_user:scmd_password@db:5432/scmd_db
      - REDIS_URL=redis://redis:6379/0

  # --- 3. DATABASE (POSTGIS) ---
  db:
    image: postgis/postgis:15-3.3
    container_name: scmd_postgres
    environment:
      - POSTGRES_DB=scmd_db
      - POSTGRES_USER=scmd_user
      - POSTGRES_PASSWORD=scmd_password
    healthcheck: # Kiểm tra xem DB đã thực sự nhận kết nối chưa
      test: ["CMD-SHELL", "pg_isready -U scmd_user -d scmd_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # --- 4. REDIS ---
  redis:
    image: redis:7
    container_name: scmd_redis
    ports:
      - "6380:6379"
    restart: always

volumes:
  postgres_data: