services:
  db:
    image: postgis/postgis:15-3.3-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=scmd_db
      - POSTGRES_USER=scmd_user
      - POSTGRES_PASSWORD=scmd_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scmd_user -d scmd_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  web:
    build: .
    volumes:
      - .:/app
