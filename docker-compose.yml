services:
  db:
    image: postgis/postgis:15-3.3-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=scmd_db
      - POSTGRES_USER=scmd_user
      - POSTGRES_PASSWORD=scmd_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scmd_user -d scmd_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-local-dev-key
      - DATABASE_URL=postgres://scmd_user:scmd_pass@db:5432/scmd_db
      - REDIS_URL=redis://redis:6379/0
      - SCMD_ORGANIZATION_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://scmd_user:scmd_pass@db:5432/scmd_db
      - REDIS_URL=redis://redis:6379/0
      - SCMD_ORGANIZATION_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    command: celery -A config beat -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://scmd_user:scmd_pass@db:5432/scmd_db
      - REDIS_URL=redis://redis:6379/0
      - SCMD_ORGANIZATION_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
