{% extends "base.html" %}
{% block title %}Phê duyệt Đề xuất{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="p-6 bg-slate-50 border-b border-slate-200">
            <h1 class="text-xl font-bold text-slate-800">Phê duyệt: {{ proposal.tieu_de }}</h1>
            <p class="text-sm text-slate-500 mt-1">Người gửi: <strong>{{ proposal.nguoi_de_xuat.ho_ten }}</strong></p>
        </div>
        
        <div class="p-6 space-y-6">
            <div class="bg-blue-50/50 p-4 rounded-lg border border-blue-100">
                <h3 class="text-xs font-bold text-blue-500 uppercase mb-2">Nội dung</h3>
                <p class="text-slate-700">{{ proposal.noi_dung|linebreaks }}</p>
            </div>

            <form method="post" class="space-y-4 border-t border-slate-100 pt-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Quyết định</label>
                    <select name="trang_thai" class="w-full rounded-lg border-slate-300 p-2.5 text-sm font-bold">
                        <option value="Đã duyệt" class="text-green-600">✅ Duyệt</option>
                        <option value="Từ chối" class="text-red-600">❌ Từ chối</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Phản hồi / Ghi chú</label>
                    <textarea name="phan_hoi" rows="3" class="w-full rounded-lg border-slate-300 p-2.5 text-sm" placeholder="Nhập lý do hoặc chỉ đạo thêm..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit" class="btn bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold shadow-md w-full">
                        Xác nhận
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
